{{- /* TOC 侧边栏广告：作为 partial 被调用 */ -}}
{{- if hugo.IsProduction -}}
  {{- with site.Params.adsenseId -}}
    <div class="ad-container" style="margin: 1rem 0; text-align: center;">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="{{ . }}"
           data-ad-slot="2222"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>
  {{- end -}}

  {{- with site.Params.wwgg -}}
    <div class="wwads-cn wwads-vertical wwads-sticky" data-id="{{ . }}" style="max-width:180px"></div>
  {{- end -}}
{{- end -}}
